<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浮生命格·前世档案</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

  :root {
    --ink: #1a1008;
    --paper: #f5eed8;
    --paper-deep: #ede0c4;
    --gold: #b8862a;
    --gold-light: #d4a847;
    --rust: #8b3a1a;
    --sage: #5a7a5a;
    --mist: #7a8a7a;
    --seal: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Paper texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,150,80,0.08) 39px, rgba(180,150,80,0.08) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,150,80,0.05) 39px, rgba(180,150,80,0.05) 40px);
    pointer-events: none; z-index: 0;
  }

  /* Decorative corner marks */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at top left, rgba(184,134,42,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(139,58,26,0.10) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative; z-index: 1;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 48px 0 36px;
    position: relative;
  }
  .header-deco {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 6px;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .header h1 {
    font-size: clamp(28px, 7vw, 42px);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 4px;
    line-height: 1.2;
    position: relative;
    display: inline-block;
  }
  .header h1::before, .header h1::after {
    content: '❧';
    color: var(--gold);
    font-size: 20px;
    position: absolute;
    top: 50%; transform: translateY(-50%);
  }
  .header h1::before { left: -36px; }
  .header h1::after { right: -36px; transform: translateY(-50%) scaleX(-1); }
  .header-sub {
    margin-top: 12px;
    font-size: 14px;
    color: var(--mist);
    letter-spacing: 2px;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    color: var(--gold);
    font-size: 12px; letter-spacing: 4px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }

  /* ===== CARD ===== */
  .card {
    background: rgba(255,252,240,0.85);
    border: 1px solid rgba(184,134,42,0.3);
    border-radius: 2px;
    padding: 28px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 20px rgba(100,70,20,0.08), inset 0 0 40px rgba(245,238,216,0.4);
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute; inset: 4px;
    border: 1px solid rgba(184,134,42,0.15);
    border-radius: 1px;
    pointer-events: none;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--rust);
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
  }
  .card-title .cn-num {
    font-size: 11px;
    color: var(--gold);
    display: block;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  /* ===== FORM ===== */
  .form-row {
    display: flex; gap: 12px;
    margin-bottom: 16px;
  }
  .form-group {
    flex: 1;
    display: flex; flex-direction: column; gap: 6px;
  }
  .form-group label {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .form-group input, .form-group select {
    background: rgba(245,238,216,0.6);
    border: 1px solid rgba(184,134,42,0.4);
    border-radius: 1px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--gold);
    background: rgba(255,252,245,0.9);
  }
  .form-group input::placeholder { color: rgba(90,70,30,0.35); }

  /* ===== QUESTIONS ===== */
  .question-block {
    margin-bottom: 24px;
  }
  .question-text {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.8;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .question-num {
    color: var(--gold);
    font-size: 13px;
    margin-right: 4px;
  }
  .options-grid {
    display: flex; flex-direction: column; gap: 8px;
  }
  .option-label {
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer;
    padding: 10px 14px;
    border: 1px solid rgba(184,134,42,0.2);
    border-radius: 1px;
    transition: all 0.2s;
    background: rgba(245,238,216,0.3);
  }
  .option-label:hover {
    border-color: var(--gold);
    background: rgba(212,168,71,0.1);
  }
  .option-label input[type="radio"] { display: none; }
  .option-label.selected {
    border-color: var(--gold);
    background: rgba(184,134,42,0.12);
  }
  .option-key {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    min-width: 18px;
    margin-top: 1px;
  }
  .option-text {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.6;
    letter-spacing: 0.5px;
  }

  /* ===== BUTTON ===== */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--rust) 0%, #6b2510 100%);
    color: var(--paper);
    border: none;
    border-radius: 1px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(139,58,26,0.3);
  }
  .btn-submit::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(139,58,26,0.4);
    background: linear-gradient(135deg, #a04520 0%, #7a2d14 100%);
  }
  .btn-submit:active { transform: translateY(0); }

  .btn-reset {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: transparent;
    color: var(--mist);
    border: 1px solid rgba(120,130,120,0.3);
    border-radius: 1px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--mist); color: var(--ink); }

  /* ===== RESULT ===== */
  #result { display: none; animation: fadeIn 0.8s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    text-align: center;
    padding: 36px 24px;
    background: linear-gradient(160deg, rgba(26,16,8,0.95) 0%, rgba(60,35,10,0.98) 100%);
    border: 1px solid rgba(184,134,42,0.4);
    border-radius: 2px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .result-header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='rgba(184,134,42,0.15)'/%3E%3C/svg%3E") repeat;
  }
  .result-header::after {
    content: '';
    position: absolute; inset: 6px;
    border: 1px solid rgba(184,134,42,0.2);
    pointer-events: none;
  }
  .result-dynasty {
    font-size: 12px;
    color: var(--gold-light);
    letter-spacing: 6px;
    margin-bottom: 10px;
    position: relative;
  }
  .result-name {
    font-size: clamp(22px, 6vw, 34px);
    font-weight: 700;
    color: var(--paper);
    letter-spacing: 4px;
    margin-bottom: 8px;
    position: relative;
  }
  .result-identity {
    font-size: 15px;
    color: var(--gold-light);
    letter-spacing: 3px;
    position: relative;
    margin-bottom: 4px;
  }
  .result-zodiac {
    font-size: 12px;
    color: rgba(245,238,216,0.5);
    letter-spacing: 2px;
    position: relative;
  }

  .identity-icon {
    position: absolute;
    bottom: 14px; right: 14px;
    width: 54px; height: 54px;
    opacity: 0.55;
    filter: drop-shadow(0 0 4px rgba(184,134,42,0.3));
  }



  /* Easter egg banner */
  .easter-egg-banner {
    background: linear-gradient(135deg, rgba(192,57,43,0.15) 0%, rgba(184,134,42,0.15) 100%);
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 2px;
    padding: 14px 20px;
    text-align: center;
    margin-bottom: 16px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(192,57,43,0); }
    50% { box-shadow: 0 0 16px rgba(192,57,43,0.2); }
  }
  .easter-egg-banner .ee-label {
    font-size: 11px; color: var(--seal); letter-spacing: 4px; margin-bottom: 4px;
  }
  .easter-egg-banner .ee-name {
    font-size: 20px; font-weight: 700; color: var(--seal); letter-spacing: 3px;
  }
  .easter-egg-banner .ee-sub {
    font-size: 12px; color: var(--mist); letter-spacing: 2px; margin-top: 4px;
  }

  /* Fate lines */
  .fate-card {
    background: rgba(255,252,240,0.85);
    border: 1px solid rgba(184,134,42,0.25);
    border-radius: 2px;
    padding: 22px 20px;
    margin-bottom: 12px;
    position: relative;
  }
  .fate-card::before {
    content: '';
    position: absolute; inset: 3px;
    border: 1px solid rgba(184,134,42,0.1);
    border-radius: 1px; pointer-events: none;
  }
  .fate-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .fate-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(184,134,42,0.4), transparent);
  }
  .fate-value {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.9;
    letter-spacing: 1px;
  }
  .fate-value.highlight {
    font-size: 16px;
    color: var(--rust);
    font-weight: 600;
  }

  .closing-line {
    text-align: center;
    padding: 24px 20px;
    font-size: 15px;
    color: var(--mist);
    line-height: 2;
    letter-spacing: 2px;
    font-style: italic;
    border-top: 1px solid rgba(184,134,42,0.2);
    margin-top: 4px;
  }

  .tags-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
  }
  .tag {
    padding: 4px 12px;
    border: 1px solid rgba(184,134,42,0.35);
    border-radius: 1px;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    background: rgba(184,134,42,0.06);
  }

  /* Step indicators */
  .steps {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 24px;
  }
  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(184,134,42,0.25);
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--gold); transform: scale(1.3); }

  /* Error */
  .error-msg {
    font-size: 13px;
    color: var(--seal);
    text-align: center;
    padding: 8px;
    display: none;
    letter-spacing: 1px;
  }

  @media (max-width: 400px) {
    .card { padding: 20px 16px; }
    .form-row { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-deco">卷宗・甲子年录</div>
    <h1>浮生命格</h1>
    <div class="header-sub">前 世 档 案 · 试 解 因 缘</div>
    <div class="divider">天命所归</div>
  </div>

  <!-- INPUT FORM -->
  <div id="form-section">
    <!-- Step 1: Birthday -->
    <div class="card" id="step-birthday">
      <div class="card-title">
        <span class="cn-num">其一</span>
        报上生辰
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>年　份</label>
          <input type="number" id="birth-year" placeholder="如 1995" min="1900" max="2024">
        </div>
        <div class="form-group">
          <label>月　份</label>
          <input type="number" id="birth-month" placeholder="1-12" min="1" max="12">
        </div>
        <div class="form-group">
          <label>日　期</label>
          <input type="number" id="birth-day" placeholder="1-31" min="1" max="31">
        </div>
      </div>
      <div class="error-msg" id="date-error">请如实填写完整生辰，方可推算命格</div>
    </div>

    <!-- Step 2: Questions -->
    <div class="card" id="step-questions">
      <div class="card-title">
        <span class="cn-num">其二</span>
        四问前缘
      </div>
      <div id="questions-container"></div>
    </div>

    <button class="btn-submit" onclick="calculate()">✦ 推 算 前 世 命 格 ✦</button>
    <button class="btn-reset" onclick="resetAll()" style="display:none" id="btn-reset-top">重新推算</button>
  </div>

  <!-- RESULT -->
  <div id="result">
    <!-- Easter egg -->
    <div class="easter-egg-banner" id="easter-egg" style="display:none">
      <div class="ee-label">彩 蛋 · 命 格 共 鸣</div>
      <div class="ee-name" id="ee-name"></div>
      <div class="ee-sub" id="ee-sub"></div>
    </div>

    <!-- Result header card -->
    <div class="result-header">
      <div class="result-dynasty" id="r-dynasty"></div>
      <div class="result-name" id="r-template-name"></div>
      <div class="result-identity" id="r-identity"></div>
      <div class="result-zodiac" id="r-zodiac-shengxiao"></div>
      <svg class="identity-icon" id="r-icon" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Fate details -->
    <div class="fate-card">
      <div class="fate-label">前世天赋</div>
      <div class="fate-value highlight" id="r-talent"></div>
    </div>
    <div class="fate-card">
      <div class="fate-label">前世境遇</div>
      <div class="fate-value" id="r-story"></div>
    </div>
    <div class="fate-card">
      <div class="fate-label">感　情　线</div>
      <div class="fate-value" id="r-love"></div>
    </div>
    <div class="fate-card">
      <div class="fate-label">小　圆　满</div>
      <div class="fate-value" id="r-joy"></div>
    </div>
    <div class="fate-card">
      <div class="fate-label">小　遗　憾</div>
      <div class="fate-value" id="r-regret"></div>
    </div>

    <div class="closing-line" id="r-closing"></div>

    <button class="btn-reset" onclick="resetAll()" style="margin-top:20px">↩ 重新推算前世命格</button>
  </div>

</div>

<script>
// ===== DATA =====

const ZODIAC_MAP = {
  鼠: '唐朝', 龙: '唐朝',
  蛇: '宋朝', 鸡: '宋朝',
  虎: '汉朝', 马: '汉朝',
  兔: '明朝', 羊: '明朝',
  牛: '魏晋', 猴: '魏晋',
  狗: '清朝', 猪: '清朝',
};

const STAR_IDENTITY = {
  白羊座: '隐居山野，时有好友来访，儿女卧廊小憩，童子砍柴。春朝林雾中，是你时隐时现的歌声',
  金牛座: '居于旧巷深院，日日守着炉火与器物，慢磨细作，不慌不忙。实在琢磨不出了，就喝酒吧',
  双子座: '往来市井之间，见闻万千，与人谈笑风生，随口胡诌便是一段新事。从街头吃到街尾，人人都认得你是谁家混小子',
  巨蟹座: '边陲小城的客舍守灯人，夜夜点灯怕故人找不见回家的路，昏昏烛火下，你仿佛又看到了那个人爽朗笑声：「老板娘，再来一壶酒！」',
  狮子座: '居于临街宽院，行事磊落，一身正气。掐指观天，天地异象尽入眼底；推演星轨之时，算筹废纸满院乱放',
  处女座: '乱世南渡，携家眷避居江南。以修瓷、治印刻石为业，手法精湛。偶得珍器，便爱不释手，近于痴态',
  天秤座: '饱读诗书，待人温雅得体，遇事但求平和。喜赏风月珍馐，凡事皆求顺眼舒心，从不与人相争。诗词歌赋无一不精，堪称文林大儒',
  天蝎座: '逃离诏狱之后，住在西堤小宅，天将夜时，挑灯卖于大街小巷，烟花绽放，画舫辉煌',
  射手座: '一身轻装远行，踏遍山河万里，风来便走，云停便歇。山川旷野间，是你自在不羁的身影',
  摩羯座: '禅房修身，寡言心稳，默然耕耘十载。石窟佛身、壁间经文，皆由你亲手细细打磨',
  水瓶座: '独居僻静小筑，心思奇巧，好制新奇小物。花影深处，潜心研香调粉，新品一出，坊间顷刻哄抢',
  双鱼座: '因剑艺卓绝召入深宫，深苑独坐，唯观一方天地云卷云舒。心柔易感，见落花伤春，望归雁思人，一身侠骨，半世柔情',
};

const TEMPLATES = {
  // A系：直言表达，笔墨为剑
  A_odd: {
    name: '耀世辉煌',
    seal: '辉',
    talent: '口才超绝，落笔惊风雨，善于以一字一句搅动人心',
    story: '你的前世以文章立于世，仕途起伏却从未折腰。朝堂之上，你慷慨陈词，字字如刀；远谪他乡，你仍提笔不辍，那些写于落魄之时的文字，反而比得意时更令世人传颂。有人说你太锋芒，你只是笑笑，继续磨墨。',
    love: '你爱得炽烈，藏不住，也不想藏。那人懂你，却因聚少离多，终究只剩下一摞书信压在箱底。后来你把那段情写进了诗里，成了别人口中的千古绝句。',
    joy: '你这一生说出了很多人不敢说的话，做了很多人不敢做的事，到老了回头看，件件都无愧于心。',
    regret: '太忙于与天下对话，有时冷落了身边那个只想和你说说家常的人。',
    closing: '「试玉要烧三日满，辨材须待七年期。」\n你这一生，曾被火炼，也终成真玉。',
  },
  A_even: {
    name: '风骨铮铮',
    seal: '骨',
    talent: '胆识过人，一身正气，能在最混沌的局面里认清是非',
    story: '你的前世行事磊落，从不绕弯子。凡遇不平之事，必要出声，从不装作没看见。有人劝你明哲保身，你说不会。你被参过、被贬过，每次回来还是那副样子。后来人们才懂，你不是不怕，只是觉得值得。',

function getIconForIdentity(identity) {
  if (identity.includes('山野') || identity.includes('林雾') || identity.includes('歌声')) return IDENTITY_ICONS['山野隐居'];
  if (identity.includes('炉火') || identity.includes('器物') || identity.includes('旧巷') || identity.includes('铁砧')) return IDENTITY_ICONS['炉火器物'];
  if (identity.includes('市井') || identity.includes('混小子') || identity.includes('说书') || identity.includes('胡诌')) return IDENTITY_ICONS['市井游荡'];
  if (identity.includes('守灯') || identity.includes('客舍') || identity.includes('烛火')) return IDENTITY_ICONS['守灯人'];
  if (identity.includes('观天') || identity.includes('星轨') || identity.includes('算筹')) return IDENTITY_ICONS['观星吏'];
  if (identity.includes('制瓷') || identity.includes('修瓷') || identity.includes('珍器') || identity.includes('刻石')) return IDENTITY_ICONS['金石器物'];
  if (identity.includes('诗书') || identity.includes('诗词') || identity.includes('文林') || identity.includes('大儒')) return IDENTITY_ICONS['文林大儒'];
  if (identity.includes('诏狱') || identity.includes('西堤') || identity.includes('画舫') || identity.includes('挑灯')) return IDENTITY_ICONS['西堤夜行'];
  if (identity.includes('轻装远行') || identity.includes('山川旷野') || identity.includes('云停')) return IDENTITY_ICONS['云游驿客'];
  if (identity.includes('禅房') || identity.includes('石窟') || identity.includes('经文') || identity.includes('佛身')) return IDENTITY_ICONS['石窟匠人'];
  if (identity.includes('研香') || identity.includes('炼香') || identity.includes('小筑') || identity.includes('哄抢')) return IDENTITY_ICONS['炼香师'];
  if (identity.includes('剑') || identity.includes('深宫') || identity.includes('侠骨')) return IDENTITY_ICONS['深宫剑客'];
  return IDENTITY_ICONS['观星吏']; // default
}

// ===== INIT =====
function initQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.innerHTML = `
      <div class="question-text"><span class="question-num">第${['一','二','三','四'][i]}问</span>${q.text}</div>
      <div class="options-grid" id="q${i}-options">
        ${q.options.map(o => `
          <label class="option-label" onclick="selectOption(this, ${i})">
            <input type="radio" name="q${i}" value="${o.key}">
            <span class="option-key">${o.key}</span>
            <span class="option-text">${o.text}</span>
          </label>
        `).join('')}
      </div>
    `;
    container.appendChild(block);
    if (i < QUESTIONS.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'divider';
      sep.style.margin = '20px 0';
      sep.textContent = '· · ·';
      container.appendChild(sep);
    }
  });
}

function selectOption(label, qIndex) {
  document.querySelectorAll(`#q${qIndex}-options .option-label`).forEach(l => l.classList.remove('selected'));
  label.classList.add('selected');
}

// ===== CALC =====
function getZodiac(year) {
  const animals = ['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'];
  return animals[((year - 1900) % 12 + 12) % 12];
}

function getStar(month, day) {
  const boundaries = [
    [1,20,'摩羯座'],[2,19,'水瓶座'],[3,21,'双鱼座'],[4,20,'白羊座'],
    [5,21,'金牛座'],[6,22,'双子座'],[7,23,'巨蟹座'],[8,23,'狮子座'],
    [9,23,'处女座'],[10,24,'天秤座'],[11,23,'天蝎座'],[12,22,'射手座'],[12,31,'摩羯座']
  ];
  for (let [m, d, name] of boundaries) {
    if (month < m || (month === m && day <= d)) return name;
  }
  return '摩羯座';
}

function calculate() {
  const year = parseInt(document.getElementById('birth-year').value);
  const month = parseInt(document.getElementById('birth-month').value);
  const day = parseInt(document.getElementById('birth-day').value);
  const errEl = document.getElementById('date-error');

  if (!year || !month || !day || year < 1900 || year > 2024 || month < 1 || month > 12 || day < 1 || day > 31) {
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  // Collect answers
  const answers = [];
  for (let i = 0; i < 4; i++) {
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    if (!sel) { alert(`请回答第${['一','二','三','四'][i]}问`); return; }
    answers.push(sel.value);
  }

  // Count answers
  const count = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach(a => count[a]++);
  const maxCount = Math.max(...Object.values(count));
  const winners = Object.keys(count).filter(k => count[k] === maxCount);
  const baseKey = winners[0]; // A/B/C/D

  const zodiac = getZodiac(year);
  const star = getStar(month, day);

  // 30%概率命中本命，70%概率命运错乱，随机配入他朝他职
  let dynasty, identity;
  const allDynasties = ['唐朝','宋朝','汉朝','明朝','魏晋','清朝'];
  const allIdentities = Object.values(STAR_IDENTITY);
  if (Math.random() < 0.3) {
    dynasty = ZODIAC_MAP[zodiac];
    identity = STAR_IDENTITY[star];
  } else {
    const ownDynasty = ZODIAC_MAP[zodiac];
    const ownIdentity = STAR_IDENTITY[star];
    const otherDynasties = allDynasties.filter(d => d !== ownDynasty);
    const otherIdentities = allIdentities.filter(id => id !== ownIdentity);
    dynasty = otherDynasties[Math.floor(Math.random() * otherDynasties.length)];
    identity = otherIdentities[Math.floor(Math.random() * otherIdentities.length)];
  }

  // 生辰维度：出生日 + 年份末位 决定奇偶支线
  const birthParity = (day + (year % 10)) % 2 === 1 ? 'odd' : 'even';
  const templateKey = baseKey + '_' + birthParity;
  const tpl = TEMPLATES[templateKey];

  // Easter egg check
  const eeData = EASTER_EGGS[baseKey];
  const isAllSame = answers.every(a => a === answers[0]);
  const eeMatch = isAllSame &&
    eeData.shengxiao.includes(zodiac) &&
    eeData.zodiac.includes(star);

  // Render
  // Set identity icon
  const iconSVG = getIconForIdentity(identity);
  document.getElementById('r-icon').innerHTML = iconSVG;

  document.getElementById('r-dynasty').textContent = `◈ ${dynasty} ◈`;
  document.getElementById('r-template-name').textContent = tpl.name;
  document.getElementById('r-identity').textContent = identity;
  document.getElementById('r-zodiac-shengxiao').textContent = '';
  document.getElementById('r-talent').textContent = tpl.talent;
  document.getElementById('r-story').textContent = tpl.story;
  document.getElementById('r-love').textContent = tpl.love;
  document.getElementById('r-joy').textContent = tpl.joy;
  document.getElementById('r-regret').textContent = tpl.regret;
  document.getElementById('r-closing').textContent = tpl.closing;

  const eeEl = document.getElementById('easter-egg');
  if (eeMatch) {
    document.getElementById('ee-name').textContent = eeData.name;
    document.getElementById('ee-sub').textContent = eeData.sub;
    eeEl.style.display = 'block';
  } else {
    eeEl.style.display = 'none';
  }

  document.getElementById('form-section').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  document.getElementById('birth-year').value = '';
  document.getElementById('birth-month').value = '';
  document.getElementById('birth-day').value = '';
  document.getElementById('date-error').style.display = 'none';
  initQuestions();
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init on load
initQuestions();
</script>
